version: '3.8'

services:
  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finboss-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - finboss

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finboss-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - finboss

  # MiniIO (S3-compatible object storage for Iceberg)
  minio:
    image: minio/minio:latest
    container_name: finboss-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - finboss

  # SeaTunnel (Data Integration)
  seatunnel:
    image: apache/seatunnel:latest
    container_name: finboss-seatunnel
    ports:
      - "5801:5801"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./seatunnel:/config
      - ./seatunnel/jobs:/jobs
    networks:
      - finboss

  # Doris FE (Frontend) - Temporarily disabled (no official Docker runtime images)
  # doris-fe:
  #   image: selectdb/doris:2.1.5-fe
  #   container_name: finboss-doris-fe
  #   hostname: doris-fe
  #   ports:
  #     - "8030:8030"
  #     - "9030:9030"
  #   environment:
  #     FE_SERVERS: fe1:doris-fe:9010
  #   networks:
  #     - finboss
  #   command: ["bash", "-c", "mysql -h doris-fe -P 9030 -u root -e \"SET GLOBAL enable_short_circuit_query_set_to_default = true;\"; entrypoint.sh"]

  # Doris BE (Backend) - Temporarily disabled (no official Docker runtime images)
  # doris-be:
  #   image: selectdb/doris:2.1.5-be
  #   container_name: finboss-doris-be
  #   hostname: doris-be
  #   ports:
  #     - "8040:8040"
  #     - "9050:9050"
  #     - "9060:9060"
  #     - "9070:9070"
  #   environment:
  #     BE_ADDR: doris-be:9050
  #   depends_on:
  #     - doris-fe
  #   networks:
  #     - finboss
  #   command: ["bash", "-c", "mysql -h doris-fe -P 9030 -u root -e \"ALTER SYSTEM ADD BACKEND 'doris-be:9050';\"; entrypoint.sh"]

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: finboss-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9002:9000"   # Native (mapped to 9002 to avoid conflict with MinIO)
    environment:
      CLICKHOUSE_DB: finboss
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - finboss

  # Flink JobManager
  flink-jobmanager:
    image: flink:1.18.1
    container_name: finboss-flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        execution.checkpointing.interval: 60000
        jobmanager.memory.process.size: 1600m
    volumes:
      - ./flink:/opt/flink/conf
    networks:
      - finboss

  # Flink TaskManager
  flink-taskmanager:
    image: flink:1.18.1
    container_name: finboss-flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        execution.checkpointing.interval: 60000
        taskmanager.memory.process.size: 2048m
    networks:
      - finboss

  # Nessie (Iceberg Catalog) - 用于 Flink Iceberg 表的元数据管理
  nessie:
    image: projectnessie/nessie:0.70.0
    container_name: finboss-nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      JDBC_STORE: true
      JDBC_STORE_DATABASE: nessie
    depends_on:
      - minio
    networks:
      - finboss

networks:
  finboss:
    driver: bridge

volumes:
  minio_data:
  clickhouse_data:
